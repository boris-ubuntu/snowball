services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snowball
      POSTGRES_USER: snowball
      POSTGRES_PASSWORD: snowball
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snowball -d snowball"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: snowball
      DB_USER: snowball
      DB_PASS: snowball
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend

volumes:
  pgdata:
  caddy_data:

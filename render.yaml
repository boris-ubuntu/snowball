# Render Blueprint for Snowball
# Uses Neon for free PostgreSQL (no credit card needed)
# Sign up at https://neon.tech, create a free database, copy the connection string
services:
  - type: web
    name: snowball
    env: docker
    repo: https://github.com/boris-ubuntu/snowball
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/health
    autoDeploy: true
